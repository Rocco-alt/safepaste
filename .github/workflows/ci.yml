name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Core tests (462)
        run: node packages/core/test.js
      - name: Test CLI tests (88)
        run: node packages/test/test.js
      - name: Guard tests (128)
        run: node packages/guard/test.js
