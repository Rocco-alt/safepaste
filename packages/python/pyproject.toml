[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "safepaste"
version = "0.3.0"
description = "AI security engine — detects prompt injection across 13 attack categories. 61 patterns, zero dependencies."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [
    {name = "SafePaste Contributors"},
]
keywords = [
    "prompt-injection",
    "ai-security",
    "llm",
    "detection",
    "safepaste",
    "jailbreak",
    "ai-safety",
    "prompt-security",
    "prompt-defense",
    "llm-middleware",
    "ai-prompt-injection",
    "llm-security",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
"Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/Rocco-alt/safepaste"
Documentation = "https://github.com/Rocco-alt/safepaste/tree/main/packages/python"
Issues = "https://github.com/Rocco-alt/safepaste/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["safepaste*"]
